<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 跨平台比價儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">
    
    <nav class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
                <h1 class="text-xl font-bold tracking-wider">CS2 跨平台比價儀表板</h1>
            </div>
            <div id="connectionStatus" class="text-sm text-green-400 font-bold flex items-center gap-1">✅ 系統運作中</div>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-6">
        
        <!-- 搜尋列 -->
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 mb-8 relative">
            <h2 class="text-lg font-semibold flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                搜尋飾品名稱
            </h2>
            <div class="relative">
                <input type="text" id="searchInput" placeholder="輸入關鍵字，例如: karambit, ak47, lotus..." 
                       class="w-full bg-gray-700 border border-gray-600 text-white text-lg rounded-lg focus:ring-blue-500 focus:border-blue-500 p-4 outline-none"
                       onkeyup="handleSearch(event)" autocomplete="off">
                <ul id="searchResults" class="absolute z-10 w-full bg-gray-700 border border-gray-600 rounded-b-lg mt-1 hidden max-h-64 overflow-y-auto shadow-2xl"></ul>
            </div>
        </div>

        <!-- ⚠️ 無資料警告區 (這裡加上了一鍵即時抓取按鈕！) -->
        <div id="noDataAlert" class="bg-gray-800 border border-gray-700 p-6 mb-8 hidden rounded-xl shadow-lg flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="font-bold text-lg text-yellow-400 mb-1">查無歷史價格</p>
                <p class="text-gray-300">資料庫中目前沒有 <span id="missingSkinName" class="font-bold text-white bg-gray-700 px-2 py-1 rounded"></span> 的報價紀錄。</p>
            </div>
            <button id="fetchBtn" onclick="fetchPriceNow()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition-all flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                即時連線抓取
            </button>
        </div>

        <!-- 狀態卡片區 -->
        <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 hidden">
            <div class="bg-gray-800 p-5 rounded-xl border-t-4 border-blue-500"><div class="text-sm text-gray-400 mb-1">Steam 社群市集</div><div class="text-3xl font-bold text-white" id="priceSteam">NT$ 0</div></div>
            <div class="bg-gray-800 p-5 rounded-xl border-t-4 border-red-500"><div class="text-sm text-gray-400 mb-1">網易 BUFF</div><div class="text-3xl font-bold text-white" id="priceBuff">NT$ 0</div></div>
            <div class="bg-gray-800 p-5 rounded-xl border-t-4 border-orange-500"><div class="text-sm text-gray-400 mb-1">悠悠有品</div><div class="text-3xl font-bold text-white" id="priceUu">NT$ 0</div></div>
        </div>

        <!-- 圖表區 -->
        <div class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 hidden" id="chartCard">
            <h2 class="text-lg font-semibold mb-4" id="chartTitle">歷史價格走勢圖</h2>
            <div class="relative h-[400px] w-full">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        let priceChartInstance = null;
        const API_BASE_URL = 'http://127.0.0.1:5000/api';
        let searchTimeout = null;
        let currentSkin = ""; // 記住目前選擇的武器

        function handleSearch(event) {
            clearTimeout(searchTimeout);
            const keyword = event.target.value.trim();
            const resultsUl = document.getElementById('searchResults');
            
            if (keyword.length === 0) {
                resultsUl.classList.add('hidden');
                return;
            }

            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${API_BASE_URL}/search?q=${encodeURIComponent(keyword)}`);
                    const data = await res.json();
                    
                    if (data.success && data.results.length > 0) {
                        resultsUl.innerHTML = '';
                        data.results.forEach(skin => {
                            const li = document.createElement('li');
                            li.className = 'px-4 py-3 hover:bg-blue-600 cursor-pointer border-b border-gray-600 last:border-0';
                            li.textContent = skin;
                            li.onclick = () => selectSkin(skin);
                            resultsUl.appendChild(li);
                        });
                        resultsUl.classList.remove('hidden');
                    }
                } catch (err) {
                    console.error(err);
                }
            }, 300);
        }

        document.addEventListener('click', (e) => {
            if (!document.getElementById('searchInput').contains(e.target)) {
                document.getElementById('searchResults').classList.add('hidden');
            }
        });

        async function selectSkin(skinName) {
            currentSkin = skinName;
            document.getElementById('searchInput').value = skinName;
            document.getElementById('searchResults').classList.add('hidden');
            
            document.getElementById('noDataAlert').classList.add('hidden');
            document.getElementById('statsContainer').classList.add('hidden');
            document.getElementById('chartCard').classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/history?skin=${encodeURIComponent(skinName)}`);
                const data = await res.json();
                
                if (data.success) {
                    if (data.has_data) {
                        renderDashboard(skinName, data.history);
                    } else {
                        document.getElementById('noDataAlert').classList.remove('hidden');
                        document.getElementById('missingSkinName').textContent = skinName;
                    }
                }
            } catch (err) {
                console.error("載入失敗", err);
            }
        }

        // =====================================
        // 一鍵即時抓取功能 (呼叫 app.py)
        // =====================================
        async function fetchPriceNow() {
            const btn = document.getElementById('fetchBtn');
            const originalText = btn.innerHTML;
            
            // 讓按鈕顯示載入中，避免重複點擊
            btn.innerHTML = '⏳ 正在向三大平台詢價... (約需 5-10 秒)';
            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-gray-600');

            try {
                const res = await fetch(`${API_BASE_URL}/fetch_now`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ skin: currentSkin })
                });
                const data = await res.json();

                if (data.success) {
                    // 抓取成功，自動重新載入這把武器的圖表！
                    selectSkin(currentSkin); 
                } else {
                    alert('❌ 抓取失敗: ' + data.error); 
                }
            } catch (err) {
                alert('連線異常，請確認終端機的 app.py 是否還在運行中');
            } finally {
                // 恢復按鈕狀態
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.replace('bg-gray-600', 'bg-blue-600');
            }
        }

        function buildDataset(platformData, allLabels, labelName, colorHex) {
            if (!platformData) return { label: labelName, data: [] };
            const dataMap = {};
            platformData.forEach(item => dataMap[item.time] = item.price);
            return { 
                label: labelName, 
                data: allLabels.map(time => dataMap[time] || null), 
                borderColor: colorHex, backgroundColor: colorHex + '33', 
                borderWidth: 2, tension: 0.3, pointRadius: 4, spanGaps: true 
            };
        }

        function renderDashboard(skinName, history) {
            document.getElementById('statsContainer').classList.remove('hidden');
            document.getElementById('chartCard').classList.remove('hidden');
            document.getElementById('chartTitle').textContent = `${skinName} - 價格走勢對比`;

            const allTimes = new Set();
            ['steam', 'buff', 'uu'].forEach(platform => {
                if(history[platform]) history[platform].forEach(item => allTimes.add(item.time));
            });
            const labels = Array.from(allTimes).sort();

            const updateCard = (platform, elementId) => {
                if (history[platform] && history[platform].length > 0) {
                    document.getElementById(elementId).textContent = `NT$ ${history[platform][history[platform].length - 1].price.toFixed(2)}`;
                } else {
                    document.getElementById(elementId).textContent = '無資料';
                }
            };
            updateCard('steam', 'priceSteam');
            updateCard('buff', 'priceBuff');
            updateCard('uu', 'priceUu');

            const datasets = [
                buildDataset(history['steam'], labels, 'Steam 市集', '#3b82f6'),
                buildDataset(history['buff'], labels, '網易 BUFF', '#ef4444'),
                buildDataset(history['uu'], labels, '悠悠有品', '#f97316')
            ];

            const ctx = document.getElementById('priceChart').getContext('2d');
            if (priceChartInstance) priceChartInstance.destroy();
            Chart.defaults.color = '#9ca3af'; 
            priceChartInstance = new Chart(ctx, { type: 'line', data: { labels: labels, datasets: datasets }, options: { responsive: true, maintainAspectRatio: false }});
        }
    </script>
</body>
</html>
